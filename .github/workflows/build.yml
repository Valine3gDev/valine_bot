name: Build

permissions:
  contents: write
  packages: write

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
  build:
    name: Release binary
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            glibc: 2.17
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            glibc: 2.17

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Rustのpackage名を取得して環境変数に入れておく。(後のステップで使用)
      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV

      # zigをインストール
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1

      # rustをインストール
      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
        with:
          cache-target: release
          cache-extra-identifier: ${{ matrix.target }}
          target-dirs: target/${{ matrix.target }}
          targets: ${{ matrix.target }}
          bins: cargo-zigbuild,cargo-about
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # moldをインストール
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # ビルド
      - name: Build with glibc version
        if: matrix.glibc != -1
        run: |
          cargo zigbuild --release --target ${{ matrix.target }}.${{ matrix.glibc }}

      - name: Build without glibc version
        if: matrix.glibc == -1
        run: |
          cargo build --release --target ${{ matrix.target }}

      # ビルド済みバイナリをコピーしてリネーム
      - name: Copy and rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }} dist/${{ matrix.target }}
          cp LICENSE dist/LICENSE

      - name: Generate third-party license notices
        run: |
          cargo about generate about.hbs \
            --locked \
            --fail \
            --target ${{ matrix.target }} \
            -o dist/THIRD_PARTY_LICENSES-${{ matrix.target }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/*
